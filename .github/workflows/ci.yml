name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      go_validate: ${{ steps.filter.outputs.go_validate }}
      runtime_validate: ${{ steps.filter.outputs.runtime_validate }}
      docker_taystjk: ${{ steps.filter.outputs.docker_taystjk }}
      docker_openjk_modern64: ${{ steps.filter.outputs.docker_openjk_modern64 }}
      docker_openjk_legacy32: ${{ steps.filter.outputs.docker_openjk_legacy32 }}
      docker: ${{ steps.aggregate.outputs.docker }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go_validate:
              - ".github/workflows/ci.yml"
              - "cmd/**"
              - "internal/**"
              - "go.mod"
            runtime_validate:
              - ".github/workflows/ci.yml"
              - "scripts/**"
              - "egg/**"
              - "bundled-addons/**"
            docker_taystjk:
              - ".github/workflows/ci.yml"
              - ".github/workflows/upstream-taystjk-master-sync.yml"
              - "docker/Dockerfile"
              - "image/runtime.json"
              - "cmd/**"
              - "internal/**"
              - "scripts/**"
              - "bundled-addons/**"
              - "docs/addon_readme.md"
              - "docs/addon_readme_advanced.md"
              - "go.mod"
            docker_openjk_modern64:
              - ".github/workflows/ci.yml"
              - "docker/openjk-modern64/**"
              - "image/openjk-modern64/runtime.json"
              - "cmd/**"
              - "internal/**"
              - "scripts/**"
              - "bundled-addons/**"
              - "docs/addon_readme.md"
              - "docs/addon_readme_advanced.md"
              - "go.mod"
            docker_openjk_legacy32:
              - ".github/workflows/ci.yml"
              - "docker/openjk-legacy32/**"
              - "image/openjk-legacy32/runtime.json"
              - "cmd/**"
              - "internal/**"
              - "scripts/**"
              - "bundled-addons/**"
              - "docs/addon_readme.md"
              - "docs/addon_readme_advanced.md"
              - "go.mod"

      - name: Aggregate docker flag
        id: aggregate
        env:
          DOCKER_TAYSTJK: ${{ steps.filter.outputs.docker_taystjk }}
          DOCKER_OPENJK_MODERN64: ${{ steps.filter.outputs.docker_openjk_modern64 }}
          DOCKER_OPENJK_LEGACY32: ${{ steps.filter.outputs.docker_openjk_legacy32 }}
        run: |
          if [[ "${DOCKER_TAYSTJK}" == "true" || "${DOCKER_OPENJK_MODERN64}" == "true" || "${DOCKER_OPENJK_LEGACY32}" == "true" ]]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate scripts and egg
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 15

    steps:
      - name: Decide whether Go validation is required
        id: gate_go
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" || "${{ needs.changes.outputs.go_validate }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether runtime validation is required
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" || "${{ needs.changes.outputs.runtime_validate }}" == "true" || "${{ needs.changes.outputs.docker }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip validation for non-runtime changes
        if: steps.gate_go.outputs.run != 'true' && steps.gate.outputs.run != 'true'
        run: echo "No Go, runtime, addon, shell, egg, or image-affecting changes detected; skipping validation."

      - name: Check out repository
        if: steps.gate_go.outputs.run == 'true' || steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Go
        if: steps.gate_go.outputs.run == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.mod

      - name: Validate Go packages
        if: steps.gate_go.outputs.run == 'true'
        run: go test ./...

      - name: Validate shell scripts
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          shell_files=(
            scripts/entrypoint.sh
            scripts/install_taystjk.sh
            bundled-addons/defaults/30-checkserverstatus.sh
          )
          while IFS= read -r common_file; do
            shell_files+=("$common_file")
          done < <(find scripts/common -maxdepth 1 -type f -name '*.sh' | LC_ALL=C sort)
          for shell_file in "${shell_files[@]}"; do
            echo "bash -n ${shell_file}"
            bash -n "$shell_file"
          done

      - name: Validate Python addon helpers
        if: steps.gate.outputs.run == 'true'
        run: python3 -m py_compile bundled-addons/defaults/40-chatlogger.py bundled-addons/examples/20-python-announcer.py

      - name: Validate egg JSON
        if: steps.gate.outputs.run == 'true'
        run: jq . egg/egg-taystjk-pterodactyl.json >/dev/null

      - name: Validate runtime manifest schema
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          required_keys=(
            engine_dist_dir
            engine_binary_glob
            engine_payload_root
            runtime_common_dir
            docs_dir
            bundled_addons_dir
            antivpn_binary
            upstream_commit_file
            upstream_ref_file
          )
          manifests=(image/runtime.json)
          for manifest in "${manifests[@]}"; do
            jq -e '.schema_version == 2 and (.paths | type == "object")' "$manifest" >/dev/null \
              || { echo "${manifest} must declare schema_version == 2 with a paths object" >&2; exit 1; }
            for key in "${required_keys[@]}"; do
              value="$(jq -r --arg k "$key" '.paths[$k] // empty' "$manifest")"
              if [[ -z "$value" ]]; then
                echo "${manifest} is missing required path '${key}'" >&2
                exit 1
              fi
            done
            engine_dist="$(jq -r '.paths.engine_dist_dir' "$manifest")"
            engine_payload="$(jq -r '.paths.engine_payload_root' "$manifest")"
            if [[ "$engine_dist" == "$engine_payload" ]]; then
              echo "${manifest} declares engine_dist_dir == engine_payload_root; engine binaries and syncable payload subdirectories must live in physically separate directories" >&2
              exit 1
            fi
          done

      - name: Run sync_runtime_files regression test
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/test/sync_runtime_files_test.sh

      - name: Guard against /opt/taystjk-* reintroductions
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          if grep -RIn -- '/opt/taystjk-' scripts/ image/; then
            echo "Found /opt/taystjk-* reference under scripts/ or image/. Use \${JKA_PATH_*} from /opt/jka/runtime.json instead." >&2
            exit 1
          fi

  docker-build:
    name: Build Docker image (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - changes
      - validate
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: taystjk
            dockerfile: docker/Dockerfile
            cache_scope: taystjk-image
            changed_flag: docker_taystjk
          - target: openjk-modern64
            dockerfile: docker/openjk-modern64/Dockerfile
            cache_scope: openjk-modern64-image
            changed_flag: docker_openjk_modern64
          - target: openjk-legacy32
            dockerfile: docker/openjk-legacy32/Dockerfile
            cache_scope: openjk-legacy32-image

    steps:
      - name: Decide if this matrix cell should run
        id: gate
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          TARGET: ${{ matrix.target }}
          DOCKER_TAYSTJK: ${{ needs.changes.outputs.docker_taystjk }}
          DOCKER_OPENJK_MODERN64: ${{ needs.changes.outputs.docker_openjk_modern64 }}
          DOCKER_OPENJK_LEGACY32: ${{ needs.changes.outputs.docker_openjk_legacy32 }}
        run: |
          set -euo pipefail
          if [[ "$EVENT" == "workflow_dispatch" || "$REF" == refs/tags/v* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$TARGET" in
            taystjk)         flag="$DOCKER_TAYSTJK" ;;
            openjk-modern64) flag="$DOCKER_OPENJK_MODERN64" ;;
            openjk-legacy32) flag="$DOCKER_OPENJK_LEGACY32" ;;
            *) echo "Unknown target: $TARGET" >&2; exit 1 ;;
          esac
          if [[ "$flag" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${TARGET}: no changes affecting this target."
          fi

      - name: Check out repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Prepare image name
        if: steps.gate.outputs.run == 'true'
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.gate.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image
        if: steps.gate.outputs.run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.image.outputs.name }}:ci-${{ github.sha }}-${{ matrix.target }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false

  publish-images:
    name: Publish image to GHCR (and Docker Hub if configured)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - changes
      - validate
    if: ((github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && (needs.changes.outputs.docker == 'true' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: taystjk
            dockerfile: docker/Dockerfile
            cache_scope: taystjk-image
            upstream_repo: https://github.com/taysta/TaystJK.git
            upstream_branch: master
            build_arg_ref: TAYSTJK_REF
            build_arg_commit: TAYSTJK_COMMIT
            label_prefix: io.akiondev.taystjk
          - target: openjk-modern64
            dockerfile: docker/openjk-modern64/Dockerfile
            cache_scope: openjk-modern64-image
            upstream_repo: https://github.com/JACoders/OpenJK.git
            upstream_branch: master
            build_arg_ref: OPENJK_REF
            build_arg_commit: OPENJK_COMMIT
            label_prefix: io.akiondev.openjk
          - target: openjk-legacy32
            dockerfile: docker/openjk-legacy32/Dockerfile
            cache_scope: openjk-legacy32-image
            upstream_repo: https://github.com/JACoders/OpenJK.git
            upstream_branch: master
            build_arg_ref: OPENJK_REF
            build_arg_commit: OPENJK_COMMIT
            label_prefix: io.akiondev.openjk

    steps:
      - name: Decide if this matrix cell should run
        id: gate
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          TARGET: ${{ matrix.target }}
          DOCKER_TAYSTJK: ${{ needs.changes.outputs.docker_taystjk }}
          DOCKER_OPENJK_MODERN64: ${{ needs.changes.outputs.docker_openjk_modern64 }}
          DOCKER_OPENJK_LEGACY32: ${{ needs.changes.outputs.docker_openjk_legacy32 }}
        run: |
          set -euo pipefail
          if [[ "$EVENT" == "workflow_dispatch" || "$REF" == refs/tags/v* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$TARGET" in
            taystjk)         flag="$DOCKER_TAYSTJK" ;;
            openjk-modern64) flag="$DOCKER_OPENJK_MODERN64" ;;
            openjk-legacy32) flag="$DOCKER_OPENJK_LEGACY32" ;;
            *) echo "Unknown target: $TARGET" >&2; exit 1 ;;
          esac
          if [[ "$flag" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${TARGET}: no changes affecting this target."
          fi

      - name: Check out repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Prepare image names
        if: steps.gate.outputs.run == 'true'
        id: image
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr=ghcr.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish to Docker Hub
        if: steps.gate.outputs.run == 'true'
        id: dockerhub_gate
        env:
          PUBLISH_DOCKERHUB_VAR: ${{ vars.PUBLISH_DOCKERHUB }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ "${PUBLISH_DOCKERHUB_VAR}" == "true" && -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve upstream master commit
        if: steps.gate.outputs.run == 'true'
        id: upstream
        env:
          UPSTREAM_REPO: ${{ matrix.upstream_repo }}
          UPSTREAM_BRANCH: ${{ matrix.upstream_branch }}
        run: |
          set -euo pipefail

          upstream_sha="$(git ls-remote "${UPSTREAM_REPO}" "refs/heads/${UPSTREAM_BRANCH}" | awk '{print $1}')"
          if [[ -z "$upstream_sha" ]]; then
            echo "Failed to resolve ${UPSTREAM_REPO} ${UPSTREAM_BRANCH} HEAD" >&2
            exit 1
          fi

          short_sha="${upstream_sha:0:12}"

          echo "sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.gate.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.gate.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.gate.outputs.run == 'true' && steps.dockerhub_gate.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose target image list
        if: steps.gate.outputs.run == 'true'
        id: targets
        run: |
          {
            echo "images<<EOF"
            echo "${{ steps.image.outputs.ghcr }}"
            if [[ "${{ steps.dockerhub_gate.outputs.publish }}" == "true" ]]; then
              echo "${{ steps.image.outputs.dockerhub }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compose tag patterns
        if: steps.gate.outputs.run == 'true'
        id: tagspec
        env:
          TARGET: ${{ matrix.target }}
          SHORT_SHA: ${{ steps.upstream.outputs.short_sha }}
        run: |
          set -euo pipefail
          {
            echo "patterns<<EOF"
            case "${TARGET}" in
              taystjk)
                cat <<TAGS
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=taystjk,enable={{is_default_branch}}
          type=raw,value=master-${SHORT_SHA}
          type=raw,value=taystjk-master-${SHORT_SHA}
          TAGS
                ;;
              openjk-modern64)
                cat <<TAGS
          type=raw,value=openjk-modern64,enable={{is_default_branch}}
          type=raw,value=latest-openjk-modern64,enable={{is_default_branch}}
          type=raw,value=openjk-modern64-master-${SHORT_SHA}
          TAGS
                ;;
              openjk-legacy32)
                cat <<TAGS
          type=raw,value=openjk-legacy32,enable={{is_default_branch}}
          type=raw,value=latest-openjk-legacy32,enable={{is_default_branch}}
          type=raw,value=openjk-legacy32-master-${SHORT_SHA}
          TAGS
                ;;
              *)
                echo "Unknown target: ${TARGET}" >&2
                exit 1
                ;;
            esac
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        if: steps.gate.outputs.run == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.targets.outputs.images }}
          tags: ${{ steps.tagspec.outputs.patterns }}

      - name: Build and push
        if: steps.gate.outputs.run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            ${{ matrix.label_prefix }}.upstream.repo=${{ matrix.upstream_repo }}
            ${{ matrix.label_prefix }}.upstream.branch=${{ matrix.upstream_branch }}
            ${{ matrix.label_prefix }}.upstream.commit=${{ steps.upstream.outputs.sha }}
          build-args: |
            ${{ matrix.build_arg_ref }}=${{ steps.upstream.outputs.sha }}
            ${{ matrix.build_arg_commit }}=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false
