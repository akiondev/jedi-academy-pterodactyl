name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest

    outputs:
      go_validate: ${{ steps.filter.outputs.go_validate }}
      runtime_validate: ${{ steps.filter.outputs.runtime_validate }}
      docker: ${{ steps.filter.outputs.docker }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go_validate:
              - ".github/workflows/ci.yml"
              - "cmd/**"
              - "internal/**"
              - "go.mod"
            runtime_validate:
              - ".github/workflows/ci.yml"
              - "scripts/**"
              - "egg/**"
              - "bundled-addons/**"
            docker:
              - ".github/workflows/ci.yml"
              - "docker/**"
              - "cmd/**"
              - "internal/**"
              - "scripts/**"
              - "bundled-addons/**"
              - "docs/addon_readme.md"
              - "go.mod"

  validate:
    name: Validate scripts and egg
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Decide whether Go validation is required
        id: gate_go
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" || "${{ needs.changes.outputs.go_validate }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether runtime validation is required
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" || "${{ needs.changes.outputs.runtime_validate }}" == "true" || "${{ needs.changes.outputs.docker }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip validation for non-runtime changes
        if: steps.gate_go.outputs.run != 'true' && steps.gate.outputs.run != 'true'
        run: echo "No Go, runtime, addon, shell, egg, or image-affecting changes detected; skipping validation."

      - name: Check out repository
        if: steps.gate_go.outputs.run == 'true' || steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Go
        if: steps.gate_go.outputs.run == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.mod

      - name: Validate Go packages
        if: steps.gate_go.outputs.run == 'true'
        run: go test ./...

      - name: Validate shell scripts
        if: steps.gate.outputs.run == 'true'
        run: bash -n scripts/entrypoint.sh scripts/install_taystjk.sh bundled-addons/defaults/30-checkserverstatus.sh

      - name: Validate egg JSON
        if: steps.gate.outputs.run == 'true'
        run: jq . egg/egg-taystjk-pterodactyl.json >/dev/null

  docker-build:
    name: Build Docker image (no push)
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/jedi-academy-taystjk" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ${{ steps.image.outputs.name }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false

  publish-ghcr:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && (needs.changes.outputs.docker == 'true' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/jedi-academy-taystjk" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false
