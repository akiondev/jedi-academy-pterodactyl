name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      go_validate: ${{ steps.filter.outputs.go_validate }}
      runtime_validate: ${{ steps.filter.outputs.runtime_validate }}
      docker: ${{ steps.filter.outputs.docker }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go_validate:
              - ".github/workflows/ci.yml"
              - "cmd/**"
              - "internal/**"
              - "go.mod"
            runtime_validate:
              - ".github/workflows/ci.yml"
              - "scripts/**"
              - "egg/**"
              - "bundled-addons/**"
            docker:
              - ".github/workflows/ci.yml"
              - ".github/workflows/upstream-taystjk-master-sync.yml"
              - "docker/**"
              - "cmd/**"
              - "internal/**"
              - "scripts/**"
              - "bundled-addons/**"
              - "docs/addon_readme.md"
              - "docs/addon_readme_advanced.md"
              - "go.mod"

  validate:
    name: Validate scripts and egg
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 15

    steps:
      - name: Decide whether Go validation is required
        id: gate_go
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" || "${{ needs.changes.outputs.go_validate }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether runtime validation is required
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" || "${{ needs.changes.outputs.runtime_validate }}" == "true" || "${{ needs.changes.outputs.docker }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip validation for non-runtime changes
        if: steps.gate_go.outputs.run != 'true' && steps.gate.outputs.run != 'true'
        run: echo "No Go, runtime, addon, shell, egg, or image-affecting changes detected; skipping validation."

      - name: Check out repository
        if: steps.gate_go.outputs.run == 'true' || steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Go
        if: steps.gate_go.outputs.run == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.mod

      - name: Validate Go packages
        if: steps.gate_go.outputs.run == 'true'
        run: go test ./...

      - name: Validate shell scripts
        if: steps.gate.outputs.run == 'true'
        run: bash -n scripts/entrypoint.sh scripts/install_taystjk.sh bundled-addons/defaults/30-checkserverstatus.sh

      - name: Validate Python addon helpers
        if: steps.gate.outputs.run == 'true'
        run: python3 -m py_compile bundled-addons/defaults/40-chatlogger.py bundled-addons/examples/20-python-announcer.py

      - name: Validate egg JSON
        if: steps.gate.outputs.run == 'true'
        run: jq . egg/egg-taystjk-pterodactyl.json >/dev/null

  docker-build:
    name: Build Docker image (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - changes
      - validate
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ${{ steps.image.outputs.name }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false

  publish-images:
    name: Publish image to GHCR (and Docker Hub if configured)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - changes
      - validate
    if: ((github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && (needs.changes.outputs.docker == 'true' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: image
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr=ghcr.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish to Docker Hub
        id: dockerhub_gate
        env:
          PUBLISH_DOCKERHUB_VAR: ${{ vars.PUBLISH_DOCKERHUB }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ "${PUBLISH_DOCKERHUB_VAR}" == "true" && -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve TaystJK master commit
        id: upstream
        run: |
          set -euo pipefail

          upstream_sha="$(git ls-remote https://github.com/taysta/TaystJK.git refs/heads/master | awk '{print $1}')"
          if [[ -z "$upstream_sha" ]]; then
            echo "Failed to resolve TaystJK master HEAD" >&2
            exit 1
          fi

          short_sha="${upstream_sha:0:12}"

          echo "sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=master-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "runtime_tag=taystjk-master-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub_gate.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose target image list
        id: targets
        run: |
          {
            echo "images<<EOF"
            echo "${{ steps.image.outputs.ghcr }}"
            if [[ "${{ steps.dockerhub_gate.outputs.publish }}" == "true" ]]; then
              echo "${{ steps.image.outputs.dockerhub }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.targets.outputs.images }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=taystjk,enable={{is_default_branch}}
            type=raw,value=${{ steps.upstream.outputs.tag }}
            type=raw,value=${{ steps.upstream.outputs.runtime_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            io.akiondev.taystjk.upstream.repo=https://github.com/taysta/TaystJK.git
            io.akiondev.taystjk.upstream.branch=master
            io.akiondev.taystjk.upstream.commit=${{ steps.upstream.outputs.sha }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false
