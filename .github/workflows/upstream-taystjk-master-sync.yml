name: Upstream TaystJK Sync

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: upstream-taystjk-sync
  cancel-in-progress: false

jobs:
  publish-upstream:
    name: Detect upstream master and publish ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: taystjk-modern64
            dockerfile: docker/taystjk-modern64/Dockerfile
            cache_scope: taystjk-modern64-image
            egg_path: egg/egg-jka-taystjk-modern64-pterodactyl.json
            expected_engine_binary: /opt/jka/engine/taystjkded.x86_64
            expected_payload_dir: /opt/jka/engine-payload/taystjk
          - target: taystjk-legacy32
            dockerfile: docker/taystjk-legacy32/Dockerfile
            cache_scope: taystjk-legacy32-image
            egg_path: egg/egg-jka-taystjk-legacy32-pterodactyl.json
            expected_engine_binary: /opt/jka/engine/taystjkded.i386
            expected_payload_dir: /opt/jka/engine-payload/taystjk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: image
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr=ghcr.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish to Docker Hub
        id: dockerhub_gate
        env:
          PUBLISH_DOCKERHUB_VAR: ${{ vars.PUBLISH_DOCKERHUB }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ "${PUBLISH_DOCKERHUB_VAR}" == "true" && -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve latest TaystJK master commit
        id: upstream
        run: |
          set -euo pipefail

          upstream_sha="$(git ls-remote https://github.com/taysta/TaystJK.git refs/heads/master | awk '{print $1}')"
          if [[ -z "$upstream_sha" ]]; then
            echo "Failed to resolve TaystJK master HEAD" >&2
            exit 1
          fi

          echo "sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub_gate.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check whether canonical runtime tag already contains upstream commit
        id: existing
        env:
          RUNTIME_TAG: ${{ matrix.target }}
        run: |
          set -euo pipefail

          image_ref="${{ steps.image.outputs.ghcr }}:${RUNTIME_TAG}"
          if ! docker buildx imagetools inspect "$image_ref" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docker pull "$image_ref" >/dev/null
          published_sha="$(docker run --rm --entrypoint /bin/sh "$image_ref" -c 'cat /opt/jka/engine/.upstream-commit 2>/dev/null || true' | tr -d '\r\n')"

          echo "exists=true" >> "$GITHUB_OUTPUT"
          if [[ -n "$published_sha" && "$published_sha" == "${{ steps.upstream.outputs.sha }}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Runtime tag ${RUNTIME_TAG} already points at upstream commit ${published_sha}"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Runtime tag ${RUNTIME_TAG} points at ${published_sha:-<none>}, upstream is ${{ steps.upstream.outputs.sha }}"
          fi

      - name: Validate shell scripts
        if: steps.existing.outputs.up_to_date != 'true'
        run: bash -n scripts/entrypoint.sh scripts/install_taystjk.sh bundled-addons/defaults/30-checkserverstatus.sh

      - name: Validate Python addon helpers
        if: steps.existing.outputs.up_to_date != 'true'
        run: python3 -m py_compile bundled-addons/defaults/40-chatlogger.py bundled-addons/examples/20-python-announcer.py

      - name: Validate egg JSON
        if: steps.existing.outputs.up_to_date != 'true'
        run: jq . "${{ matrix.egg_path }}" >/dev/null

      - name: Build local smoke-test image
        if: steps.existing.outputs.up_to_date != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: local/taystjk-upstream-sync:${{ matrix.target }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false

      - name: Smoke test image contents
        if: steps.existing.outputs.up_to_date != 'true'
        run: |
          set -euo pipefail

          docker run --rm --entrypoint /bin/sh "local/taystjk-upstream-sync:${{ matrix.target }}" -c '
            test -x "${{ matrix.expected_engine_binary }}" &&
            test -d "${{ matrix.expected_payload_dir }}" &&
            test -x /usr/local/bin/jka-antivpn &&
            test -f /opt/jka/engine/.upstream-commit &&
            test -f /opt/jka/runtime.json
          '

      - name: Compose published tag list
        if: steps.existing.outputs.up_to_date != 'true'
        id: tags
        env:
          RUNTIME_TAG: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tags=()
          for registry in "${{ steps.image.outputs.ghcr }}" "${{ steps.image.outputs.dockerhub }}"; do
            if [[ "$registry" == "${{ steps.image.outputs.dockerhub }}" && "${{ steps.dockerhub_gate.outputs.publish }}" != "true" ]]; then
              continue
            fi
            tags+=("${registry}:${RUNTIME_TAG}")
          done
          {
            echo "list<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.existing.outputs.up_to_date != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.akiondev.taystjk.upstream.repo=https://github.com/taysta/TaystJK.git
            io.akiondev.taystjk.upstream.branch=master
            io.akiondev.taystjk.upstream.commit=${{ steps.upstream.outputs.sha }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false
