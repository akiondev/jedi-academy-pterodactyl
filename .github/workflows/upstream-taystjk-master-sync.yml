name: Upstream TaystJK Master Sync

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: upstream-taystjk-master-sync
  cancel-in-progress: false

jobs:
  publish-upstream-master:
    name: Detect upstream master and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: image
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr=ghcr.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${owner_lc}/jedi-academy-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish to Docker Hub
        id: dockerhub_gate
        env:
          PUBLISH_DOCKERHUB_VAR: ${{ vars.PUBLISH_DOCKERHUB }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ "${PUBLISH_DOCKERHUB_VAR}" == "true" && -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve latest TaystJK master commit
        id: upstream
        run: |
          set -euo pipefail

          upstream_sha="$(git ls-remote https://github.com/taysta/TaystJK.git refs/heads/master | awk '{print $1}')"
          if [[ -z "$upstream_sha" ]]; then
            echo "Failed to resolve TaystJK master HEAD" >&2
            exit 1
          fi

          short_sha="${upstream_sha:0:12}"

          echo "sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=master-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "runtime_tag=taystjk-master-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub_gate.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check whether upstream image already exists
        id: existing
        run: |
          set -euo pipefail

          image_ref="${{ steps.image.outputs.ghcr }}:${{ steps.upstream.outputs.runtime_tag }}"
          if docker buildx imagetools inspect "$image_ref" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Upstream image already published for ${image_ref}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate shell scripts
        if: steps.existing.outputs.exists != 'true'
        run: bash -n scripts/entrypoint.sh scripts/install_taystjk.sh bundled-addons/defaults/30-checkserverstatus.sh

      - name: Validate Python addon helpers
        if: steps.existing.outputs.exists != 'true'
        run: python3 -m py_compile bundled-addons/defaults/40-chatlogger.py bundled-addons/examples/20-python-announcer.py

      - name: Validate egg JSON
        if: steps.existing.outputs.exists != 'true'
        run: jq . egg/egg-taystjk-pterodactyl.json >/dev/null

      - name: Build local smoke-test image
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          tags: local/taystjk-upstream-sync:${{ steps.upstream.outputs.short_sha }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false

      - name: Smoke test image contents
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail

          docker run --rm --entrypoint /bin/sh "local/taystjk-upstream-sync:${{ steps.upstream.outputs.short_sha }}" -c '
            test -x /opt/taystjk-dist/taystjkded.x86_64 &&
            test -d /opt/taystjk-dist/taystjk &&
            test -x /usr/local/bin/taystjk-antivpn &&
            test -f /opt/taystjk-dist/.taystjk-upstream-commit
          '

      - name: Compose published tag list
        if: steps.existing.outputs.exists != 'true'
        id: tags
        run: |
          set -euo pipefail
          tags=()
          for registry in "${{ steps.image.outputs.ghcr }}" "${{ steps.image.outputs.dockerhub }}"; do
            if [[ "$registry" == "${{ steps.image.outputs.dockerhub }}" && "${{ steps.dockerhub_gate.outputs.publish }}" != "true" ]]; then
              continue
            fi
            tags+=("${registry}:latest")
            tags+=("${registry}:taystjk")
            tags+=("${registry}:${{ steps.upstream.outputs.tag }}")
            tags+=("${registry}:${{ steps.upstream.outputs.runtime_tag }}")
          done
          {
            echo "list<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.akiondev.taystjk.upstream.repo=https://github.com/taysta/TaystJK.git
            io.akiondev.taystjk.upstream.branch=master
            io.akiondev.taystjk.upstream.commit=${{ steps.upstream.outputs.sha }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false
