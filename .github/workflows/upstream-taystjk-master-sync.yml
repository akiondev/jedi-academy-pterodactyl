name: Upstream TaystJK Master Sync

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: upstream-taystjk-master-sync
  cancel-in-progress: false

jobs:
  publish-upstream-master:
    name: Detect upstream master and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/jedi-academy-taystjk" >> "$GITHUB_OUTPUT"

      - name: Resolve latest TaystJK master commit
        id: upstream
        run: |
          set -euo pipefail

          upstream_sha="$(git ls-remote https://github.com/taysta/TaystJK.git refs/heads/master | awk '{print $1}')"
          if [[ -z "$upstream_sha" ]]; then
            echo "Failed to resolve TaystJK master HEAD" >&2
            exit 1
          fi

          short_sha="${upstream_sha:0:12}"

          echo "sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=master-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether upstream image already exists
        id: existing
        run: |
          set -euo pipefail

          image_ref="${{ steps.image.outputs.name }}:${{ steps.upstream.outputs.tag }}"
          if docker buildx imagetools inspect "$image_ref" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Upstream image already published for ${image_ref}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build local smoke-test image
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          tags: local/taystjk-upstream-sync:${{ steps.upstream.outputs.short_sha }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false

      - name: Smoke test image contents
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail

          docker run --rm --entrypoint /bin/sh "local/taystjk-upstream-sync:${{ steps.upstream.outputs.short_sha }}" -c '
            test -x /opt/taystjk-dist/taystjkded.x86_64 &&
            test -d /opt/taystjk-dist/taystjk &&
            test -x /usr/local/bin/taystjk-antivpn &&
            test -f /opt/taystjk-dist/.taystjk-upstream-commit
          '

      - name: Build and push image
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.upstream.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.akiondev.taystjk.upstream.repo=https://github.com/taysta/TaystJK.git
            io.akiondev.taystjk.upstream.branch=master
            io.akiondev.taystjk.upstream.commit=${{ steps.upstream.outputs.sha }}
          build-args: |
            TAYSTJK_REF=${{ steps.upstream.outputs.sha }}
            TAYSTJK_COMMIT=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha,scope=taystjk-image
          cache-to: type=gha,mode=max,scope=taystjk-image
          provenance: false
